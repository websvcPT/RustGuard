name: Build and Release

on:
  push:
    tags:
      - "*"

permissions:
  contents: write

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable

      - name: Install Linux GUI dependencies (Tauri)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - name: Build linux artifacts
        run: ./scripts/build_release.sh "${GITHUB_REF_NAME#v}" linux

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: rustguard-linux
          path: dist/linux/*

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable

      - name: Prepare Windows artifact
        shell: bash
        run: |
          version="${GITHUB_REF_NAME#v}"
          ./scripts/build_release.sh "$version" windows

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: rustguard-windows
          path: dist/windows/*

  release:
    runs-on: ubuntu-latest
    needs: [build-linux, build-windows]
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/rustguard-linux/*
            artifacts/rustguard-windows/*
